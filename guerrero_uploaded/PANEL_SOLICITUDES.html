<section class="admin-section">

  </div>

  <div class="filters-bar" style="margin-bottom: 20px; display: flex; gap: 10px;">

      ✓ Aprobadas
    </button>

      ✗ Rechazadas

    <button id="btnTodas" class="btn btn-secondary">

  </div>

  <!-- Tabla de solicitudes -->

</section>
