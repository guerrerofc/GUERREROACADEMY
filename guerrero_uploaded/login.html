<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Guerrero Academy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    
    .login-container {
      width: 100%;
      max-width: 400px;
    }
    
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
      text-decoration: none;
      color: #1d1d1f;
    }
    
    .logo img {
      width: 48px;
      height: 48px;
    }
    
    .logo span {
      font-size: 20px;
      font-weight: 700;
    }
    
    .login-box {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 20px;
      padding: 32px;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
      color: #1d1d1f;
    }
    
    .subtitle {
      text-align: center;
      color: #86868b;
      font-size: 15px;
      margin-bottom: 28px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1d1d1f;
      margin-bottom: 8px;
    }
    
    .input {
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      background: #fff;
      color: #1d1d1f;
      outline: none;
      transition: border-color 0.2s;
    }
    
    .input:focus {
      border-color: #1d1d1f;
    }
    
    .input::placeholder {
      color: #aeaeb2;
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      background: #1d1d1f;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .btn:hover {
      background: #000;
    }
    
    .btn:disabled {
      background: #86868b;
      cursor: not-allowed;
    }
    
    .error-msg {
      background: rgba(255, 59, 48, 0.1);
      border: 1px solid rgba(255, 59, 48, 0.2);
      color: #d70015;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }
    
    .error-msg.show {
      display: block;
    }
    
    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: #86868b;
      text-decoration: none;
      font-size: 14px;
    }
    
    .back-link:hover {
      color: #1d1d1f;
    }
    
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <a class="logo" href="./landing-mejorado.html">
      <img src="logo-guerrero.svg" alt="Guerrero Academy">
      <span>Guerrero Academy</span>
    </a>
    
    <div class="login-box">
      <h1>Iniciar sesión</h1>
      <p class="subtitle">Ingresa tus credenciales</p>
      
      <div class="error-msg" id="errorMsg"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="input" id="email" placeholder="tu@email.com" required>
        </div>
        
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" class="input" id="password" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn" id="btnLogin">Iniciar sesión</button>
      </form>
      
      <a class="back-link" href="./landing-mejorado.html">← Volver al inicio</a>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://daijiuqqafvjofafwqck.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhaWppdXFxYWZ2am9mYWZ3cWNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NTk0MjMsImV4cCI6MjA4ODAzNTQyM30.DtdQALhTs8mt91GiBoWSrPbW2wc2EY5cmPXf-7oSC-g";
    
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // Mapeo de roles a paneles
    const rolePanels = {
      'super_admin': 'super-admin.html',
      'superadmin': 'super-admin.html',
      'admin': 'super-admin.html',
      'director': 'director-panel.html',
      'staff': 'staff-panel.html',
      'entrenador': 'staff-panel.html',
      'padre': 'parent-panel.html',
      'parent': 'parent-panel.html',
      'tutor': 'parent-panel.html',
      'operativo': 'operativo-panel.html'
    };
    
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('btnLogin');
    const errorMsg = document.getElementById('errorMsg');
    
    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
    }
    
    function hideError() {
      errorMsg.classList.remove('show');
    }
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        showError('Por favor completa todos los campos');
        return;
      }
      
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>Verificando...';
      
      try {
        // 1. Intentar login con Supabase Auth
        const { data: authData, error: authError } = await sb.auth.signInWithPassword({
          email,
          password
        });
        
        if (authError) {
          // Si falla Supabase Auth, verificar en tabla users
          const { data: userData, error: userError } = await sb
            .from('users')
            .select('*')
            .eq('email', email)
            .single();
          
          if (userError || !userData) {
            showError('Email o contraseña incorrectos');
            btn.disabled = false;
            btn.innerHTML = 'Iniciar sesión';
            return;
          }
          
          // SEGURIDAD: Verificar que existe password y coincide
          // Si no hay password en la tabla, NO permitir acceso
          if (!userData.password) {
            showError('Usuario no tiene contraseña configurada. Contacte al administrador.');
            btn.disabled = false;
            btn.innerHTML = 'Iniciar sesión';
            return;
          }
          
          if (userData.password !== password) {
            showError('Email o contraseña incorrectos');
            btn.disabled = false;
            btn.innerHTML = 'Iniciar sesión';
            return;
          }
          
          // Usuario encontrado y contraseña correcta, redirigir según rol
          const rol = (userData.rol || userData.role || 'padre').toLowerCase();
          redirectToPanel(rol, userData);
          return;
        }
        
        // 2. Auth exitoso, buscar rol del usuario
        const { data: userData, error: userError } = await sb
          .from('users')
          .select('*')
          .eq('email', email)
          .single();
        
        if (userError || !userData) {
          // Si no está en users, verificar en players (podría ser un padre)
          const { data: playerData } = await sb
            .from('players')
            .select('*')
            .eq('tutor_email', email)
            .single();
          
          if (playerData) {
            redirectToPanel('padre', { email, nombre: playerData.tutor_nombre });
            return;
          }
          
          // Usuario autenticado pero sin rol, mandarlo a padre por defecto
          redirectToPanel('padre', { email });
          return;
        }
        
        // 3. Redirigir según el rol
        const rol = (userData.rol || userData.role || 'padre').toLowerCase();
        redirectToPanel(rol, userData);
        
      } catch (err) {
        console.error('Error:', err);
        showError('Error al iniciar sesión. Intenta de nuevo.');
        btn.disabled = false;
        btn.innerHTML = 'Iniciar sesión';
      }
    });
    
    function redirectToPanel(rol, userData) {
      // Guardar datos del usuario en localStorage
      localStorage.setItem('guerrero_user', JSON.stringify({
        email: userData.email,
        nombre: userData.nombre || userData.name || '',
        rol: rol
      }));
      
      // Buscar el panel correspondiente
      const panel = rolePanels[rol] || 'parent-panel.html';
      
      btn.innerHTML = 'Redirigiendo...';
      
      // Redirigir
      window.location.href = './' + panel;
    }
    
    // Verificar si ya hay sesión activa
    async function checkExistingSession() {
      const { data: { session } } = await sb.auth.getSession();
      
      if (session) {
        const { data: userData } = await sb
          .from('users')
          .select('*')
          .eq('email', session.user.email)
          .single();
        
        if (userData) {
          const rol = (userData.rol || userData.role || 'padre').toLowerCase();
          redirectToPanel(rol, userData);
        }
      }
    }
    
    // Verificar sesión al cargar
    checkExistingSession();
  </script>

</body>
</html>
